name: CI

# Hermetic tests + dependency audit + frontend build. Runs on every PR plus pushes
# to main (PR-protected, so every change is covered by the PR run before merge).
# The backend unit suite needs NO database or secrets — auth uses an HS256 test
# secret, the cognitive scorer uses fake items, and email is exercised unconfigured.
# (DB-backed smoke tests run locally per the golden rule.)
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'          # matches backend/Dockerfile
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hermetic unit tests
        run: |
          python auth_test.py
          python cognitive_test.py
          python report_test.py

  audit:
    # pip-audit scans the PRODUCTION dependencies for known CVEs.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit production dependencies
        run: pip-audit -r requirements.txt --strict --progress-spinner off

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
