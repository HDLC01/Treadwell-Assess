name: Deploy

# Continuous deployment to the Bluehost VPS — a hosted runner SSHes in and runs
# `git pull && docker compose --profile full up -d --build` (image built ON the VPS,
# no registry; the runner only needs SSH).
#
# NOTE: manual-only (workflow_dispatch) until Phase 5 lands the prod stack + secrets.
# Phase 5 checklist before flipping this to auto-deploy on `push: [main]`:
#   - /opt/treadwell-assess exists on the VPS with this repo cloned
#   - nginx server block: assess.wetreadwell.com -> 127.0.0.1:8896 (web) /api -> 8897
#   - repo secrets VPS_HOST / VPS_USER / VPS_SSH_KEY set
#   - a `production` environment with HDLC01 as required reviewer
on:
  workflow_dispatch:        # manual re-deploy from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  production:
    runs-on: ubuntu-latest
    environment: production          # required reviewer -> waits for approval
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true          # abort on the first failing command
          script: |
            set -euo pipefail
            cd /opt/treadwell-assess
            git pull --ff-only
            docker compose --profile full up -d --build
            # wait until the API reports healthy, else fail the deploy
            for i in $(seq 1 24); do
              if curl -fsS http://localhost:8897/api/health >/dev/null; then
                echo "assess healthy"; exit 0
              fi
              sleep 5
            done
            echo "post-deploy healthcheck failed"; exit 1
