name: CodeQL

# Static analysis (SAST) for the Python backend and the TypeScript frontend. Runs
# on every PR plus pushes to main (PR-protected), plus a weekly scheduled scan to
# catch newly-published query patterns.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '27 3 * * 1'   # Mondays 03:27 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # 'security-extended' adds more queries than the default set
          queries: security-extended

      # Both languages are interpreted — no build step needed; analyze directly.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
