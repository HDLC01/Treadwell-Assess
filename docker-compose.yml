# Treadwell Assess — three services: Postgres + FastAPI api + Next.js web.
# Local dev usually runs only `db` here (api/web run natively for hot reload).
# Loopback-only ports; nginx is the public surface in prod:
#   assess.wetreadwell.com -> 127.0.0.1:8896 (web), /api -> 127.0.0.1:8897 (api)
services:
  db:
    image: postgres:16-alpine
    container_name: treadwell-assess-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assess}
      POSTGRES_USER: ${POSTGRES_USER:-assess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assess-dev-password}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assess} -d ${POSTGRES_DB:-assess}"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./backend
    image: treadwell-assess-api:latest   # pin a name so prod can `up -d` a prebuilt image (no on-box build)
    container_name: treadwell-assess-api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "127.0.0.1:8897:8897"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["full"]   # `docker compose --profile full up` runs the whole stack

  web:
    build: ./frontend
    image: treadwell-assess-web:latest   # pin a name so prod can `up -d` a prebuilt image (no on-box build)
    container_name: treadwell-assess-web
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:8897
    ports:
      - "127.0.0.1:8896:3000"
    depends_on:
      - api
    profiles: ["full"]

volumes:
  pgdata:
